<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaterStamp — Bulk Watermark Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #c8ff3e;
    --accent2: #3effcf;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --danger: #ff4e6a;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,62,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,62,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 56px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .tagline {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .panel:focus-within::before,
  .panel.active::before {
    opacity: 1;
  }

  .panel-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragging {
    border-color: var(--accent);
    background: rgba(200,255,62,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.4rem;
    margin-bottom: 10px;
    display: block;
  }

  .drop-text {
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-text strong {
    color: var(--accent);
    display: block;
    font-size: 0.85rem;
    margin-bottom: 4px;
  }

  /* File list */
  .file-list {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .file-list::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 0.72rem;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .file-item .file-name {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-item .file-size {
    color: var(--muted);
    flex-shrink: 0;
  }

  .file-item .file-remove {
    color: var(--danger);
    cursor: pointer;
    flex-shrink: 0;
    opacity: 0.6;
    transition: opacity 0.15s;
    background: none;
    border: none;
    font-size: 0.9rem;
    line-height: 1;
    padding: 0 2px;
  }

  .file-item .file-remove:hover { opacity: 1; }

  .file-count {
    font-size: 0.7rem;
    color: var(--accent);
    margin-top: 10px;
    text-align: right;
  }

  /* Settings panel */
  .settings-panel {
    grid-column: 1 / -1;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .settings-grid { grid-template-columns: 1fr; }
  }

  /* Form controls */
  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    min-height: 80px;
    line-height: 1.5;
  }

  .field { margin-bottom: 0; }

  /* Watermark preview inline */
  .wm-preview-wrap {
    margin-top: 14px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wm-preview-bg {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 10px,
      transparent 10px,
      transparent 20px
    );
  }

  .wm-preview-text {
    position: relative;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: rgba(200, 255, 62, 0.25);
    text-align: center;
    word-break: break-all;
    letter-spacing: 0.05em;
    transform: rotate(-20deg);
    text-shadow: 0 0 20px rgba(200,255,62,0.4);
    transition: all 0.2s;
    pointer-events: none;
    user-select: none;
  }

  /* Range slider */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .slider-val {
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* Position grid */
  .pos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .pos-btn {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--muted);
    transition: all 0.15s;
    padding: 4px;
    text-align: center;
    line-height: 1.2;
    font-family: 'DM Mono', monospace;
  }

  .pos-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .pos-btn.selected {
    background: rgba(200,255,62,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Action button */
  .action-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
    margin-top: 4px;
  }

  .btn-generate {
    flex: 1;
    padding: 16px 24px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-generate:hover:not(:disabled) {
    background: #d9ff4f;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200,255,62,0.3);
  }

  .btn-generate:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  .btn-clear {
    padding: 16px 20px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-clear:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* Progress */
  .progress-wrap {
    margin-top: 16px;
    display: none;
  }

  .progress-wrap.visible { display: block; }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.2s;
    width: 0%;
  }

  .progress-text {
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .progress-text span { color: var(--accent); }

  /* Results */
  .results-section {
    margin-top: 28px;
    display: none;
  }

  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .results-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .btn-download-all {
    padding: 8px 16px;
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-download-all:hover {
    background: rgba(62,255,207,0.1);
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .result-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .result-info {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-name {
    flex: 1;
    font-size: 0.65rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-dl {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0;
    opacity: 0.7;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .btn-dl:hover { opacity: 1; }

  /* Notif */
  .notif {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 0.78rem;
    color: var(--accent);
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .notif.show {
    opacity: 1;
    transform: translateY(0);
  }

  canvas { display: none; }

  select {
    cursor: pointer;
  }

  option {
    background: var(--surface2);
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-row">
      <div class="logo-icon">⬡</div>
    </div>
    <h1>Water<span>Stamp</span></h1>
    <p class="tagline">Bulk WebP Watermark Generator — Fast &amp; Lossless</p>
  </header>

  <div class="main-grid">
    <!-- Upload Panel -->
    <div class="panel" id="uploadPanel">
      <div class="panel-label">01 — Upload Foto</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept=".webp,image/webp">
        <span class="drop-icon">🖼️</span>
        <div class="drop-text">
          <strong>Klik atau drag &amp; drop</strong>
          Format WebP · Multi-file didukung
        </div>
      </div>
      <div class="file-list" id="fileList"></div>
      <div class="file-count" id="fileCount" style="display:none"></div>
    </div>

    <!-- Watermark Text Panel -->
    <div class="panel" id="wmPanel">
      <div class="panel-label">02 — Teks Watermark</div>
      <div class="field">
        <label>Ketik teks watermark kamu</label>
        <textarea id="wmText" placeholder="© Nama / Brand / Copyright 2024" rows="3"></textarea>
      </div>
      <div style="margin-top:12px;">
        <label>Preview Watermark</label>
        <div class="wm-preview-wrap">
          <div class="wm-preview-bg"></div>
          <div class="wm-preview-text" id="wmPreviewText">© Your Watermark</div>
        </div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="panel settings-panel">
      <div class="panel-label">03 — Pengaturan</div>
      <div class="settings-grid">
        <!-- Opacity -->
        <div>
          <label>Opacity Watermark</label>
          <div class="slider-wrap">
            <input type="range" id="opacityRange" min="5" max="100" value="25" step="1">
            <span class="slider-val" id="opacityVal">25%</span>
          </div>
        </div>

        <!-- Font Size -->
        <div>
          <label>Ukuran Font</label>
          <div class="slider-wrap">
            <input type="range" id="fontSizeRange" min="12" max="120" value="36" step="2">
            <span class="slider-val" id="fontSizeVal">36px</span>
          </div>
        </div>

        <!-- Color -->
        <div>
          <label>Warna Teks</label>
          <select id="wmColor">
            <option value="255,255,255">Putih</option>
            <option value="0,0,0">Hitam</option>
            <option value="200,255,62">Lime (Neon)</option>
            <option value="255,200,0">Emas</option>
            <option value="255,255,255" selected>Putih</option>
          </select>
        </div>

        <!-- Position -->
        <div>
          <label>Posisi Watermark</label>
          <div class="pos-grid" id="posGrid">
            <button class="pos-btn" data-pos="top-left">↖ Atas Kiri</button>
            <button class="pos-btn" data-pos="top-center">↑ Atas Tengah</button>
            <button class="pos-btn" data-pos="top-right">↗ Atas Kanan</button>
            <button class="pos-btn" data-pos="center-left">← Tengah Kiri</button>
            <button class="pos-btn selected" data-pos="center">◉ Tengah</button>
            <button class="pos-btn" data-pos="center-right">→ Tengah Kanan</button>
            <button class="pos-btn" data-pos="bottom-left">↙ Bawah Kiri</button>
            <button class="pos-btn" data-pos="bottom-center">↓ Bawah Tengah</button>
            <button class="pos-btn" data-pos="bottom-right">↘ Bawah Kanan</button>
          </div>
        </div>

        <!-- Repeat mode -->
        <div>
          <label>Mode Tiling</label>
          <select id="wmMode">
            <option value="single">Single — satu posisi</option>
            <option value="repeat">Repeat — tersebar merata</option>
            <option value="diagonal">Diagonal — miring berulang</option>
          </select>
        </div>

        <!-- Quality -->
        <div>
          <label>Kualitas Output WebP</label>
          <div class="slider-wrap">
            <input type="range" id="qualityRange" min="70" max="100" value="92" step="1">
            <span class="slider-val" id="qualityVal">92</span>
          </div>
        </div>
      </div>

      <!-- Action row -->
      <div class="action-row" style="margin-top:20px;">
        <button class="btn-generate" id="btnGenerate" disabled>
          ⬡ Generate Watermark
        </button>
        <button class="btn-clear" id="btnClear">Hapus Semua</button>
      </div>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-text">
          <span id="progressLabel">Memproses...</span>
          <span id="progressCount">0 / 0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <div class="results-title">Hasil — Siap Download</div>
      <button class="btn-download-all" id="btnDownloadAll">
        ⬇ Download Semua (.zip)
      </button>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</div>

<div class="notif" id="notif"></div>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const fileList = document.getElementById('fileList');
  const fileCount = document.getElementById('fileCount');
  const wmText = document.getElementById('wmText');
  const wmPreviewText = document.getElementById('wmPreviewText');
  const opacityRange = document.getElementById('opacityRange');
  const opacityVal = document.getElementById('opacityVal');
  const fontSizeRange = document.getElementById('fontSizeRange');
  const fontSizeVal = document.getElementById('fontSizeVal');
  const qualityRange = document.getElementById('qualityRange');
  const qualityVal = document.getElementById('qualityVal');
  const wmColor = document.getElementById('wmColor');
  const wmMode = document.getElementById('wmMode');
  const posGrid = document.getElementById('posGrid');
  const btnGenerate = document.getElementById('btnGenerate');
  const btnClear = document.getElementById('btnClear');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  const progressCount = document.getElementById('progressCount');
  const resultsSection = document.getElementById('resultsSection');
  const resultsGrid = document.getElementById('resultsGrid');
  const btnDownloadAll = document.getElementById('btnDownloadAll');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const notif = document.getElementById('notif');

  let files = [];
  let results = [];
  let selectedPos = 'center';

  // Notif helper
  function showNotif(msg, duration = 2500) {
    notif.textContent = msg;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), duration);
  }

  // Update preview text
  function updatePreview() {
    const txt = wmText.value.trim() || '© Your Watermark';
    wmPreviewText.textContent = txt;
    const op = parseInt(opacityRange.value) / 100;
    const [r,g,b] = wmColor.value.split(',');
    wmPreviewText.style.color = `rgba(${r},${g},${b},${op})`;
    wmPreviewText.style.fontSize = Math.min(parseInt(fontSizeRange.value), 28) + 'px';
    document.getElementById('uploadPanel').classList.toggle('active', files.length > 0);
  }

  wmText.addEventListener('input', updatePreview);
  opacityRange.addEventListener('input', () => {
    opacityVal.textContent = opacityRange.value + '%';
    updatePreview();
  });
  fontSizeRange.addEventListener('input', () => {
    fontSizeVal.textContent = fontSizeRange.value + 'px';
    updatePreview();
  });
  qualityRange.addEventListener('input', () => {
    qualityVal.textContent = qualityRange.value;
  });
  wmColor.addEventListener('change', updatePreview);

  // Position selector
  posGrid.querySelectorAll('.pos-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      posGrid.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedPos = btn.dataset.pos;
    });
  });

  // Drag & Drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragging');
    const dropped = Array.from(e.dataTransfer.files).filter(f => f.type === 'image/webp' || f.name.endsWith('.webp'));
    addFiles(dropped);
  });

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
  }

  function addFiles(newFiles) {
    const existing = new Set(files.map(f => f.name + f.size));
    const filtered = newFiles.filter(f => !existing.has(f.name + f.size));
    if (!filtered.length) { showNotif('File sudah ada dalam daftar'); return; }
    files = files.concat(filtered);
    renderFileList();
    updateGenBtn();
    if (filtered.length) showNotif(`${filtered.length} file ditambahkan ✓`);
  }

  function renderFileList() {
    fileList.innerHTML = '';
    files.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span class="file-name" title="${f.name}">🖼 ${f.name}</span>
        <span class="file-size">${formatBytes(f.size)}</span>
        <button class="file-remove" data-i="${i}" title="Hapus">×</button>
      `;
      fileList.appendChild(item);
    });
    fileList.querySelectorAll('.file-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        files.splice(parseInt(btn.dataset.i), 1);
        renderFileList();
        updateGenBtn();
      });
    });
    if (files.length > 0) {
      fileCount.textContent = `${files.length} file dipilih`;
      fileCount.style.display = 'block';
    } else {
      fileCount.style.display = 'none';
    }
  }

  function updateGenBtn() {
    btnGenerate.disabled = files.length === 0;
  }

  btnClear.addEventListener('click', () => {
    files = [];
    results = [];
    renderFileList();
    updateGenBtn();
    resultsSection.classList.remove('visible');
    resultsGrid.innerHTML = '';
    progressWrap.classList.remove('visible');
    showNotif('Semua file dihapus');
  });

  // Draw watermark on canvas
  function applyWatermark(img, options) {
    const { text, opacity, fontSize, color, position, mode } = options;

    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    if (!text.trim()) return;

    const [r, g, b] = color.split(',').map(Number);
    ctx.fillStyle = `rgba(${r},${g},${b},${opacity})`;
    ctx.font = `bold ${fontSize}px "Arial", sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';

    const lines = text.split('\n').filter(l => l.trim());

    if (mode === 'single') {
      drawWatermarkSingle(lines, fontSize, position);
    } else if (mode === 'repeat') {
      drawWatermarkRepeat(lines, fontSize, opacity, r, g, b);
    } else if (mode === 'diagonal') {
      drawWatermarkDiagonal(lines, fontSize, opacity, r, g, b);
    }
  }

  function drawWatermarkSingle(lines, fontSize, position) {
    const W = canvas.width, H = canvas.height;
    const lineH = fontSize * 1.4;
    const totalH = lines.length * lineH;
    const padding = Math.min(W, H) * 0.04;

    let x, y;
    if (position === 'top-left') { x = padding + ctx.measureText(lines[0]).width/2; y = padding + totalH/2; ctx.textAlign = 'left'; x = padding; }
    else if (position === 'top-center') { x = W/2; y = padding + totalH/2; }
    else if (position === 'top-right') { x = W - padding; y = padding + totalH/2; ctx.textAlign = 'right'; }
    else if (position === 'center-left') { x = padding; y = H/2; ctx.textAlign = 'left'; }
    else if (position === 'center') { x = W/2; y = H/2; }
    else if (position === 'center-right') { x = W - padding; y = H/2; ctx.textAlign = 'right'; }
    else if (position === 'bottom-left') { x = padding; y = H - padding - totalH/2; ctx.textAlign = 'left'; }
    else if (position === 'bottom-center') { x = W/2; y = H - padding - totalH/2; }
    else if (position === 'bottom-right') { x = W - padding; y = H - padding - totalH/2; ctx.textAlign = 'right'; }

    lines.forEach((line, i) => {
      ctx.fillText(line, x, y - (lines.length-1)*lineH/2 + i*lineH);
    });
  }

  function drawWatermarkRepeat(lines, fontSize, opacity, r, g, b) {
    const W = canvas.width, H = canvas.height;
    ctx.textAlign = 'center';
    const measuredW = ctx.measureText(lines[0]).width;
    const spacingX = measuredW * 2.2;
    const spacingY = fontSize * 3.5;

    for (let y = spacingY/2; y < H + spacingY; y += spacingY) {
      for (let x = 0; x < W + spacingX; x += spacingX) {
        lines.forEach((line, i) => {
          ctx.fillText(line, x, y + (i - (lines.length-1)/2) * fontSize * 1.4);
        });
      }
    }
  }

  function drawWatermarkDiagonal(lines, fontSize, opacity, r, g, b) {
    const W = canvas.width, H = canvas.height;
    const angle = -Math.PI / 6;
    const measuredW = ctx.measureText(lines[0]).width;
    const spacingX = measuredW * 2;
    const spacingY = fontSize * 4;

    ctx.save();
    ctx.rotate(angle);

    const diagW = W * 1.5, diagH = H * 1.5;
    for (let y = -diagH; y < diagH * 2; y += spacingY) {
      for (let x = -diagW; x < diagW * 2; x += spacingX) {
        lines.forEach((line, i) => {
          ctx.fillText(line, x, y + (i - (lines.length-1)/2) * fontSize * 1.4);
        });
      }
    }
    ctx.restore();
  }

  // Generate
  btnGenerate.addEventListener('click', async () => {
    if (!files.length) return;

    results = [];
    resultsGrid.innerHTML = '';
    resultsSection.classList.remove('visible');
    progressWrap.classList.add('visible');
    btnGenerate.disabled = true;
    btnGenerate.textContent = '⏳ Memproses...';

    const options = {
      text: wmText.value || '© Watermark',
      opacity: parseInt(opacityRange.value) / 100,
      fontSize: parseInt(fontSizeRange.value),
      color: wmColor.value,
      position: selectedPos,
      mode: wmMode.value,
    };
    const quality = parseInt(qualityRange.value) / 100;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const pct = Math.round(((i) / files.length) * 100);
      progressBar.style.width = pct + '%';
      progressLabel.textContent = `Memproses: ${file.name}`;
      progressCount.textContent = `${i} / ${files.length}`;

      try {
        const blob = await processFile(file, options, quality);
        const url = URL.createObjectURL(blob);
        const name = file.name.replace(/\.webp$/i, '') + '_watermark.webp';
        results.push({ url, blob, name });
        addResultCard({ url, blob, name });
      } catch(e) {
        console.error(e);
        showNotif(`Error pada ${file.name}`, 3000);
      }

      // Small delay to not block UI
      await new Promise(r => setTimeout(r, 10));
    }

    progressBar.style.width = '100%';
    progressLabel.textContent = '✓ Selesai!';
    progressCount.textContent = `${files.length} / ${files.length}`;

    setTimeout(() => {
      progressWrap.classList.remove('visible');
      progressBar.style.width = '0%';
    }, 1500);

    btnGenerate.disabled = false;
    btnGenerate.innerHTML = '⬡ Generate Watermark';
    resultsSection.classList.add('visible');
    showNotif(`${results.length} foto berhasil diproses ✓`);
  });

  function processFile(file, options, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        try {
          applyWatermark(img, options);
          canvas.toBlob(blob => {
            URL.revokeObjectURL(url);
            if (blob) resolve(blob);
            else reject(new Error('Blob null'));
          }, 'image/webp', quality);
        } catch(e) { URL.revokeObjectURL(url); reject(e); }
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Load fail')); };
      img.src = url;
    });
  }

  function addResultCard({ url, blob, name }) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <img class="result-thumb" src="${url}" alt="${name}" loading="lazy">
      <div class="result-info">
        <span class="result-name" title="${name}">${name}</span>
        <button class="btn-dl" title="Download" data-url="${url}" data-name="${name}">⬇</button>
      </div>
    `;
    card.querySelector('.btn-dl').addEventListener('click', (e) => {
      const a = document.createElement('a');
      a.href = e.currentTarget.dataset.url;
      a.download = e.currentTarget.dataset.name;
      a.click();
    });
    resultsGrid.appendChild(card);
  }

  // Download all as zip
  btnDownloadAll.addEventListener('click', async () => {
    if (!results.length) return;
    btnDownloadAll.textContent = '⏳ Menyiapkan ZIP...';
    btnDownloadAll.disabled = true;

    const zip = new JSZip();
    results.forEach(({ blob, name }) => zip.file(name, blob));

    const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 1 } });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'waterstamp_bulk.zip';
    a.click();
    URL.revokeObjectURL(a.href);

    btnDownloadAll.innerHTML = '⬇ Download Semua (.zip)';
    btnDownloadAll.disabled = false;
    showNotif('ZIP berhasil diunduh ✓');
  });

  // Init
  updatePreview();
</script>
</body>
</html>
